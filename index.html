<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escape Room Matemático</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #020617;
  font-family: Arial, sans-serif;
  overflow: hidden;
  width: 100%;
  height: 100%;
}

.app {
  position: absolute;
  width: 600px;
  height: 600px;
  transform-origin: top left;
}

/* IMAGEN */
#fondo {
  position: absolute;
  width: 600px;
  height: 600px;
  left: 0;
  top: 0;
  z-index: 1;
}

/* INPUTS */
input {
  position: absolute;
  z-index: 5;
  width: 128px;
  height: 27px;
  font-size: 20px;
  text-align: center;
  border-radius: 7px;
  border: 2px solid #22c55e;
  background: rgba(255,255,255,0.95);
  box-shadow: 0 0 6px #22c55e;
}

.correcto {
  background: #bbf7d0;
  border-color: #22c55e;
}

.incorrecto {
  background: #fecaca;
  border-color: #ef4444;
}

/* TEMPORIZADOR */
#tiempo {
  position: absolute;
  z-index: 6;
  top: 42px;
  left: 205px;
  width: 190px;
  text-align: center;
  font-size: 42px;
  color: #ff3b2e;
  font-weight: bold;
  font-family: monospace;
  text-shadow: 0 0 10px red;
  background: rgba(0,0,0,0.35);
  border-radius: 8px;
}

/* CANDADOS */
.candado {
  position: absolute;
  z-index: 6;
  font-size: 26px;
  color: #777;
}

.candado.ok {
  color: #22c55e;
  text-shadow: 0 0 10px #22c55e;
}

/* MENSAJE FINAL */
#mensaje {
  display: none;
  position: absolute;
  z-index: 10;
  left: 70px;
  top: 420px;
  width: 450px;
  padding: 18px;
  border-radius: 15px;
  background: rgba(6, 95, 70, 0.96);
  color: white;
  text-align: center;
  font-size: 19px;
  box-shadow: 0 0 25px #22c55e;
}
</style>
</head>

<body>

<div class="app" id="app">

<img id="fondo" src="./fondo-escape.png">

<div id="tiempo">50:00</div>

<audio id="victoria" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<script>
function ajustarPantalla(){
  const app=document.getElementById("app");
  const escala=Math.min(window.innerWidth/600,window.innerHeight/600);
  app.style.transform=`scale(${escala})`;
  app.style.left=((window.innerWidth-600*escala)/2)+"px";
  app.style.top=((window.innerHeight-600*escala)/2)+"px";
}
window.onload=ajustarPantalla;
window.onresize=ajustarPantalla;

let abierto=false;
document.querySelectorAll(".r").forEach(i=>{
  i.addEventListener("input",comprobar);
});

function comprobarFila(n){
  const fila=document.querySelectorAll(".fila"+n);
  let bien=true;
  fila.forEach(i=>{
    const v=i.value.trim();
    const s=i.dataset.sol;
    i.classList.remove("correcto","incorrecto");
    if(v===""){bien=false;return;}
    if(v===s){i.classList.add("correcto");}
    else{bien=false;i.classList.add("incorrecto");}
  });
  const lock=document.getElementById("lock"+n);
  lock.textContent=bien?"🔓":"🔒";
  if(bien) lock.classList.add("ok"); else lock.classList.remove("ok");
  return bien;
}

function comprobar(){
  if(abierto)return;
  let todo=true;
  for(let i=1;i<=10;i++){
    if(!comprobarFila(i)) todo=false;
  }
  if(todo){
    abierto=true;
    document.getElementById("mensaje").style.display="block";
    document.getElementById("victoria").play();
  }
}

/* TEMPORIZADOR */
let t=50*60;
setInterval(()=>{
  let m=Math.floor(t/60);
  let s=t%60;
  document.getElementById("tiempo").textContent=
    String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  t--;
},1000);
</script>

</body>
</html>
