<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escape Room Matemático</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #020617;
  font-family: Arial, sans-serif;
  overflow: hidden;
  width: 100%;
  height: 100%;
}

.app {
  position: absolute;
  width: 600px;
  height: 600px;
  background-image: url("./fondo-escape.png");
  background-size: 600px 600px;
  background-repeat: no-repeat;
  background-position: top left;
  transform-origin: top left;
}

input {
  position: absolute;
  width: 128px;
  height: 26px;
  font-size: 20px;
  text-align: center;
  border-radius: 7px;
  border: 2px solid #22c55e;
  background: rgba(255,255,255,0.95);
  box-shadow: 0 0 8px #22c55e;
}

.correcto {
  background: #bbf7d0;
  border-color: #22c55e;
  color: black;
}

.incorrecto {
  background: #fecaca;
  border-color: #ef4444;
  color: black;
}

#tiempo {
  position: absolute;
  top: 37px;
  left: 205px;
  width: 190px;
  text-align: center;
  font-size: 48px;
  color: #ff3b2e;
  font-weight: bold;
  font-family: monospace;
  text-shadow: 0 0 15px red;
}

.candado {
  position: absolute;
  font-size: 28px;
  color: #777;
  text-shadow: 0 0 6px black;
}

.candado.ok {
  color: #22c55e;
  text-shadow: 0 0 12px #22c55e;
}

#mensaje {
  display: none;
  position: absolute;
  left: 70px;
  top: 420px;
  width: 450px;
  padding: 18px;
  border-radius: 15px;
  background: rgba(6, 95, 70, 0.96);
  color: white;
  text-align: center;
  font-size: 19px;
  box-shadow: 0 0 25px #22c55e;
  z-index: 10;
}

.puerta-abierta {
  animation: brillo 1s infinite alternate;
}

@keyframes brillo {
  from { box-shadow: inset 0 0 0 transparent; }
  to { box-shadow: inset 0 0 80px #facc15; }
}
</style>
</head>

<body>

<div class="app" id="app">

  <div id="tiempo">50:00</div>

  <!-- FILA 1 -->
  <input class="r fila1" data-sol="10" style="left:96px; top:169px;">

  <!-- FILA 3 -->
  <input class="r fila3" data-sol="15" style="left:96px; top:251px;">
  <input class="r fila3" data-sol="40" style="left:297px; top:251px;">
  <input class="r fila3" data-sol="60" style="left:459px; top:251px;">
  <div class="candado" id="lock3" style="left:584px; top:248px;">🔒</div>

  <input class="r fila4" data-sol="15" style="left:96px; top:292px;">
  <input class="r fila4" data-sol="36" style="left:297px; top:292px;">
  <input class="r fila4" data-sol="54" style="left:459px; top:292px;">

  <!-- FILA 5 -->
  <input class="r fila5" data-sol="24" style="left:96px; top:333px;">
  <input class="r fila5" data-sol="56" style="left:297px; top:333px;">

  <div class="candado" id="lock5" style="left:584px; top:330px;">🔒</div>

  <!-- FILA 6 -->
  <input class="r fila6" data-sol="25" style="left:96px; top:374px;">
  <input class="r fila6" data-sol="60" style="left:297px; top:374px;">

</div>

<audio id="victoria" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="alarma" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script>
function ajustarPantalla() {
  const app = document.getElementById("app");
  const escalaX = window.innerWidth / 600;
  const escalaY = window.innerHeight / 600;
  const escala = Math.min(escalaX, escalaY);

  app.style.transform = `scale(${escala})`;
  app.style.left = ((window.innerWidth - 600 * escala) / 2) + "px";
  app.style.top = ((window.innerHeight - 600 * escala) / 2) + "px";
}

window.addEventListener("load", ajustarPantalla);
window.addEventListener("resize", ajustarPantalla);

let abierto = false;
let total = 50 * 60;
let restante = total;

const inputs = document.querySelectorAll(".r");

inputs.forEach(input => {
  input.addEventListener("input", comprobar);
});

function comprobarFila(numeroFila) {
  const fila = document.querySelectorAll(".fila" + numeroFila);
  let filaBien = true;

  fila.forEach(input => {
    const valor = input.value.trim();
    const solucion = input.dataset.sol;

    input.classList.remove("correcto", "incorrecto");

    if (valor === "") {
      filaBien = false;
      return;
    }

    if (valor === solucion) {
      input.classList.add("correcto");
    } else {
      input.classList.add("incorrecto");
      filaBien = false;
    }
  });

  const candado = document.getElementById("lock" + numeroFila);

  if (filaBien) {
    candado.classList.add("ok");
    candado.textContent = "🔓";
  } else {
    candado.classList.remove("ok");
    candado.textContent = "🔒";
  }

  return filaBien;
}

function comprobar() {
  if (abierto) return;

  let todoBien = true;

  for (let i = 1; i <= 10; i++) {
    if (!comprobarFila(i)) {
      todoBien = false;
    }
  }

  if (todoBien) {
    abierto = true;
    clearInterval(intervalo);
    document.getElementById("mensaje").style.display = "block";
    document.getElementById("app").classList.add("puerta-abierta");
    document.getElementById("victoria").play();
  }
}

function actualizarTiempo() {
  const min = Math.floor(restante / 60);
  const seg = restante % 60;

  document.getElementById("tiempo").textContent =
    String(min).padStart(2, "0") + ":" + String(seg).padStart(2, "0");

  if (restante <= 0) {
    clearInterval(intervalo);
    document.getElementById("alarma").play();
  }

  restante--;
}

const intervalo = setInterval(actualizarTiempo, 1000);
</script>

</body>
</html>
